<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>消消乐 ✨</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Fluid board size: fills screen, capped at 620px ── */
    :root {
      --bs: min(620px, 96vw, calc(100svh - 170px));
      --cell-font: clamp(16px, calc(var(--bs) / 13), 32px);
    }

    body {
      font-family: 'Segoe UI', 'Arial Rounded MT Bold', Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 50%, #e0f7fa 100%);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      overflow-x: hidden;
      gap: 6px;
    }

    /* ── Title ── */
    #game-title {
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 900;
      color: #d81b60;
      text-shadow: 2px 2px 0 #fff, 0 0 20px rgba(216,27,96,.3);
      letter-spacing: 2px;
      user-select: none;
      flex-shrink: 0;
    }

    /* ── HUD ── */
    #hud {
      width: var(--bs);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 8px 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,.1);
      flex-shrink: 0;
    }
    .hud-box { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
    .hud-label { font-size: clamp(9px, 2vw, 11px); color: #999; text-transform: uppercase; letter-spacing: 1px; }
    .hud-value { font-size: clamp(18px, 4vw, 22px); font-weight: 800; color: #333; }
    #hud-level { font-size: clamp(13px, 3vw, 15px); font-weight: 700; color: #d81b60; }

    /* ── Progress bar ── */
    #progress-wrap {
      width: var(--bs);
      height: 10px;
      background: rgba(255,255,255,.6);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.1);
      flex-shrink: 0;
    }
    #progress-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #f06292, #ff8a65);
      transition: width .4s ease;
      width: 0%;
    }

    /* ── Board container ── */
    #board-wrap {
      position: relative;
      width: var(--bs);
      height: var(--bs);
      flex-shrink: 0;
    }

    /* ── Board grid ── */
    #board {
      width: var(--bs);
      height: var(--bs);
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(10, 1fr);
      gap: clamp(2px, 0.5vw, 4px);
      padding: clamp(2px, 0.8vw, 5px);
      background: rgba(255,255,255,.35);
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.8);
    }

    /* ── Cells ── */
    .cell {
      border-radius: clamp(4px, 1.2vw, 9px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--cell-font);
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s, box-shadow .12s;
      position: relative;
      overflow: hidden;
    }
    .cell::after {
      content: '';
      position: absolute;
      top: 3px; left: 4px; right: 4px;
      height: 4px;
      border-radius: 3px;
      background: rgba(255,255,255,.35);
      pointer-events: none;
    }
    @media (hover: hover) {
      .cell.type-block:hover { transform: scale(1.08); z-index: 5; }
    }
    .cell.type-wall {
      background: #546e7a !important;
      box-shadow: inset 0 -3px 0 #263238 !important;
      cursor: not-allowed;
    }
    .cell.type-wall::after { display: none; }
    .cell.type-empty {
      background: rgba(200,200,200,.18);
      cursor: default;
    }
    .cell.type-empty::after { display: none; }

    .cell.selected {
      transform: scale(1.12) !important;
      z-index: 20;
      outline: 3px solid #fff;
      box-shadow: 0 0 0 5px #f06292, 0 4px 16px rgba(240,98,146,.5) !important;
    }

    /* ── Hint highlight ── */
    .cell.hint-a, .cell.hint-b {
      animation: pulse-hint 0.7s ease-in-out infinite;
      z-index: 10;
    }
    .cell.hint-a { outline: 3px solid #ffd600; }
    .cell.hint-b { outline: 3px solid #69f0ae; }
    @keyframes pulse-hint {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,214,0,0); transform: scale(1); }
      50%      { box-shadow: 0 0 14px 4px rgba(255,214,0,.55); transform: scale(1.1); }
    }

    /* ── Eliminate animation ── */
    .cell.eliminating {
      animation: pop 0.42s ease-out forwards;
      pointer-events: none;
    }
    @keyframes pop {
      0%   { transform: scale(1); opacity: 1; }
      40%  { transform: scale(1.35); opacity: .8; }
      100% { transform: scale(0); opacity: 0; }
    }

    /* ── Fall-in animation ── */
    .cell.fall-in {
      animation: fallIn 0.35s ease-out;
    }
    @keyframes fallIn {
      0%   { transform: translateY(-60px); opacity: 0; }
      100% { transform: translateY(0);     opacity: 1; }
    }

    /* ── Swap animation: cells fly to each other's position ── */
    .cell.swapping {
      will-change: transform;
      z-index: 30 !important;
      pointer-events: none;
    }

    /* ── Score popup ── */
    .score-popup {
      position: absolute;
      font-size: clamp(14px, 3vw, 20px);
      font-weight: 900;
      color: #d81b60;
      text-shadow: 1px 1px 0 #fff;
      pointer-events: none;
      z-index: 200;
      animation: floatUp 1.1s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; transform: translateY(-40px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-80px) scale(.8); }
    }

    /* ── Footer buttons ── */
    #footer {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn {
      padding: clamp(8px, 2vw, 10px) clamp(14px, 4vw, 22px);
      border: none;
      border-radius: 50px;
      font-size: clamp(12px, 2.5vw, 14px);
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s, box-shadow .12s;
      letter-spacing: .5px;
    }
    .btn:active { transform: scale(0.95); }
    @media (hover: hover) {
      .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.18); }
    }
    .btn-primary  { background: linear-gradient(135deg,#f06292,#ff8a65); color:#fff; }
    .btn-secondary{ background: rgba(255,255,255,.85); color:#555; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .btn-info     { background: linear-gradient(135deg,#4fc3f7,#29b6f6); color:#fff; }

    /* ── Overlay / Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.48);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      backdrop-filter: blur(4px);
      padding: 16px;
    }
    .overlay.hidden { display: none; }
    .modal-card {
      background: #fff;
      border-radius: 24px;
      padding: clamp(24px, 5vw, 40px) clamp(20px, 5vw, 36px);
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,.25);
      animation: modalPop .3s ease-out;
    }
    @keyframes modalPop {
      0% { transform: scale(.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-title { font-size: clamp(22px, 5vw, 30px); font-weight: 900; color: #d81b60; margin-bottom: 12px; }
    .modal-body  { color: #555; line-height: 1.7; margin-bottom: 24px; font-size: clamp(13px, 3vw, 15px); }
    .modal-body p { margin-bottom: 6px; }
    .modal-body strong { color: #d81b60; }
    .modal-btns  { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ── Level select grid ── */
    #lvl-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .lvl-btn {
      padding: 10px 4px;
      border-radius: 12px;
      font-size: clamp(11px, 2.5vw, 13px);
      font-weight: 700;
      border: 2px solid transparent;
      cursor: pointer;
      touch-action: manipulation;
      transition: all .15s;
    }
    .lvl-btn.unlocked   { background:#f8bbd0; color:#880e4f; border-color:#f48fb1; }
    .lvl-btn.unlocked:hover { background:#f06292; color:#fff; }
    .lvl-btn.completed  { background:#c8e6c9; color:#1b5e20; border-color:#81c784; }
    .lvl-btn.active     { background: linear-gradient(135deg,#f06292,#ff8a65); color:#fff; }
    .lvl-btn.locked     { background:#eeeeee; color:#bbb; cursor:not-allowed; }

    /* ── Instruction steps ── */
    .step-list { text-align:left; padding-left:0; list-style:none; }
    .step-list li { padding: 5px 0; }
    .step-list li::before { content:'✦ '; color:#f06292; }
  </style>
</head>
<body>

<div id="game-title">🌸 消消乐 ✨</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-box">
    <span class="hud-label">步数</span>
    <span class="hud-value" id="hud-steps">0</span>
  </div>
  <div class="hud-box" style="align-items:center">
    <span id="hud-level">第 1 关</span>
    <span style="font-size:12px;color:#aaa" id="hud-target"></span>
  </div>
  <div class="hud-box" style="align-items:flex-end">
    <span class="hud-label">得分</span>
    <span class="hud-value" id="hud-score">0</span>
  </div>
</div>

<!-- Progress -->
<div id="progress-wrap"><div id="progress-fill"></div></div>

<!-- Board -->
<div id="board-wrap">
  <div id="board"></div>
</div>

<!-- Footer -->
<div id="footer">
  <button class="btn btn-secondary" id="btn-restart">🔄 重来</button>
  <button class="btn btn-info"      id="btn-hint">💡 提示</button>
  <button class="btn btn-secondary" id="btn-levels">📋 关卡</button>
</div>

<!-- ═══════════ MODALS ═══════════ -->

<!-- Start screen -->
<div class="overlay" id="modal-start">
  <div class="modal-card">
    <div class="modal-title">🌸 消消乐</div>
    <div class="modal-body">
      <ul class="step-list">
        <li>点击两个<strong>相邻</strong>的方块来交换位置</li>
        <li>3 个或更多<strong>相同颜色</strong>相连即可消除</li>
        <li>消除后上方方块<strong>自动落下</strong>并补充新方块</li>
        <li>得分达到目标分数即可<strong>过关</strong>！</li>
      </ul>
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" id="btn-start">开始游戏 ▶</button>
    </div>
  </div>
</div>

<!-- Level complete -->
<div class="overlay hidden" id="modal-complete">
  <div class="modal-card">
    <div class="modal-title">🎉 过关啦！</div>
    <div class="modal-body">
      <p>完成 <strong id="mc-level"></strong></p>
      <p>得分：<strong id="mc-score"></strong></p>
      <p>步数：<strong id="mc-steps"></strong></p>
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="btn-stay">继续本关</button>
      <button class="btn btn-primary"   id="btn-next">下一关 ▶</button>
    </div>
  </div>
</div>

<!-- All clear -->
<div class="overlay hidden" id="modal-allclear">
  <div class="modal-card">
    <div class="modal-title">🏆 全部通关！</div>
    <div class="modal-body">
      <p>恭喜你完成了全部 <strong>10 关</strong>！</p>
      <p>你是真正的消消乐大师！ 🌟</p>
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" id="btn-replay">再来一遍</button>
    </div>
  </div>
</div>

<!-- Level select -->
<div class="overlay hidden" id="modal-levels">
  <div class="modal-card">
    <div class="modal-title">📋 选择关卡</div>
    <div id="lvl-grid"></div>
    <button class="btn btn-secondary" id="btn-close-levels">关闭</button>
  </div>
</div>

<!-- ═══════════ SCRIPT ═══════════ -->
<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const COLORS = [
  { bg:'#f48fb1', dark:'#ad1457', emoji:'🌸', img:'assets/Hello-Kitty.png' }, // 0 pink
  { bg:'#4fc3f7', dark:'#0277bd', emoji:'⭐', img:'assets/Kuromi.png.png' }, // 1 blue
  { bg:'#a5d6a7', dark:'#2e7d32', emoji:'🍀', img:'assets/Melody.png' }, // 2 green
  { bg:'#fff176', dark:'#f9a825', emoji:'🌟', img:'assets/Cinnamorall.png' }, // 3 yellow
  { bg:'#ce93d8', dark:'#6a1b9a', emoji:'🎀', img:'assets/Piano.png' }, // 4 purple
  { bg:'#ffcc80', dark:'#e65100', emoji:'🍊', img:'assets/Keroppi.png' }, // 5 orange
  { bg:'#80cbc4', dark:'#00695c', emoji:'💎', img:'assets/Pochacco.png' }, // 6 teal
  { bg:'#ef9a9a', dark:'#b71c1c', emoji:'❤️', img:'assets/Pompompurin.png' }, // 7 red
  { bg:'#9fa8da', dark:'#1a237e', emoji:'🌙', img:'assets/Bad-Badtz-Maru.png' }, // 8 indigo
  { bg:'#80deea', dark:'#006064', emoji:'🦋', img:'assets/Hangyodon.png' }, // 9 cyan
  // ↑ To use custom images: set img to a path, e.g. img:'assets/hello-kitty.png'
  // Images should be square PNGs/WebPs with transparent background.
  // Place them in an assets/ folder next to index.html.
];

// walls: array of [row, col]
const LEVELS = [
  { colorCount:7,  target:300,  walls:[] },
  { colorCount:7,  target:420,  walls:[[4,4],[5,5]] },
  { colorCount:7,  target:560,  walls:[[2,2],[2,7],[7,2],[7,7]] },
  { colorCount:8,  target:720,  walls:[[0,5],[9,4],[3,0],[6,9],[4,3],[5,6]] },
  { colorCount:8,  target:900,  walls:[[1,2],[1,7],[8,2],[8,7],[4,0],[4,9],[5,0],[5,9]] },
  { colorCount:9,  target:1100, walls:[[0,2],[0,7],[2,0],[2,9],[3,4],[3,5],[6,4],[6,5],[7,0],[7,9],[9,2],[9,7]] },
  { colorCount:9,  target:1320, walls:[[1,1],[1,5],[1,8],[4,3],[4,6],[5,3],[5,6],[8,1],[8,5],[8,8],[3,0],[6,9]] },
  { colorCount:9,  target:1560, walls:[[0,4],[0,5],[2,2],[2,7],[4,0],[4,9],[5,0],[5,9],[7,2],[7,7],[9,4],[9,5],[3,4],[6,5]] },
  { colorCount:10, target:1820, walls:[[0,0],[0,9],[9,0],[9,9],[2,2],[2,7],[7,2],[7,7],[4,4],[4,5],[5,4],[5,5],[1,5],[8,4]] },
  { colorCount:10, target:2100, walls:[[0,3],[0,6],[3,0],[6,0],[3,9],[6,9],[9,3],[9,6],[2,4],[2,5],[4,2],[5,2],[4,7],[5,7],[7,4],[7,5],[4,4],[5,5]] },
];

const ROWS = 10, COLS = 10;

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let board = [];          // board[r][c] = { t:'block'|'wall'|'empty', color:number }
let levelIdx = 0;
let score = 0;
let steps = 0;
let selected = null;     // [r,c] or null
let isAnimating = false;
let levelPassed = false;
let completedLevels = new Set();
let hintCells = null;    // [[r1,c1],[r2,c2]] or null
let comboFlag = 0;       // 0 or 1 — "连消" flag
let lastPts   = 0;       // score from the previous elimination (for bonus calc)

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

function rnd(n) { return Math.floor(Math.random() * n); }

function cellEl(r, c) {
  return document.querySelector(`#board .cell[data-r="${r}"][data-c="${c}"]`);
}

// ─────────────────────────────────────────────
//  BOARD INIT
// ─────────────────────────────────────────────
function buildBoard() {
  const cfg = LEVELS[levelIdx];
  board = Array.from({length: ROWS}, () =>
    Array.from({length: COLS}, () => ({ t:'block', color: rnd(cfg.colorCount) }))
  );
  for (const [r,c] of cfg.walls) board[r][c] = { t:'wall', color:-1 };
}

// ─────────────────────────────────────────────
//  RENDERING
// ─────────────────────────────────────────────
function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.dataset.r = r;
      div.dataset.c = c;
      styleCell(div, board[r][c]);
      div.addEventListener('click', () => onCellClick(r, c));
      el.appendChild(div);
    }
  }
}

function styleCell(div, cell) {
  div.classList.remove('type-block','type-wall','type-empty','selected');
  div.classList.add('type-' + cell.t);
  if (cell.t === 'block') {
    const col = COLORS[cell.color];
    div.style.background = `linear-gradient(145deg, ${col.bg}, ${col.dark})`;
    div.style.boxShadow  = `inset 0 -4px 0 ${col.dark}, inset 0 2px 0 rgba(255,255,255,.3)`;
    div.style.color = '#fff';
    if (col.img) {
      // Use custom cartoon image (transparent-bg PNG/WebP)
      div.innerHTML = `<img src="${col.img}" alt="" draggable="false"
        style="width:100%;height:100%;object-fit:cover;pointer-events:none;display:block;border-radius:inherit;">`;
    } else {
      div.textContent = col.emoji;
    }
  } else if (cell.t === 'wall') {
    div.style.background = '';
    div.style.boxShadow  = '';
    div.style.color = '';
    div.textContent = '🧱';
  } else {
    div.style.background = '';
    div.style.boxShadow  = '';
    div.style.color = '';
    div.textContent = '';
  }
}

function refreshCell(r, c) {
  const div = cellEl(r, c);
  if (!div) return;
  styleCell(div, board[r][c]);
  if (selected && selected[0]===r && selected[1]===c) div.classList.add('selected');
}

function updateHUD() {
  const cfg = LEVELS[levelIdx];
  document.getElementById('hud-steps').textContent = steps;
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-level').textContent = `第 ${levelIdx+1} 关`;
  document.getElementById('hud-target').textContent = `目标: ${cfg.target}`;
  const pct = Math.min(100, (score / cfg.target) * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ─────────────────────────────────────────────
//  MATCH DETECTION
// ─────────────────────────────────────────────
function isBlock(r, c) {
  return r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c].t === 'block';
}

function getGroups() {
  const seeds = new Set(); // keys "r,c" — cells matched by line or 2×2 rules

  // ── Rule 1: horizontal run of ≥ 3 same-color blocks ──
  for (let r = 0; r < ROWS; r++) {
    let runStart = 0;
    for (let c = 1; c <= COLS; c++) {
      const prev = board[r][c - 1];
      const curr = c < COLS ? board[r][c] : null;
      const cont = curr && curr.t === 'block' &&
                   prev.t === 'block' && curr.color === prev.color;
      if (!cont) {
        const len = c - runStart;
        if (len >= 3 && board[r][runStart].t === 'block') {
          for (let i = runStart; i < c; i++) seeds.add(`${r},${i}`);
        }
        runStart = c;
      }
    }
  }

  // ── Rule 2: vertical run of ≥ 3 same-color blocks ──
  for (let c = 0; c < COLS; c++) {
    let runStart = 0;
    for (let r = 1; r <= ROWS; r++) {
      const prev = board[r - 1][c];
      const curr = r < ROWS ? board[r][c] : null;
      const cont = curr && curr.t === 'block' &&
                   prev.t === 'block' && curr.color === prev.color;
      if (!cont) {
        const len = r - runStart;
        if (len >= 3 && board[runStart][c].t === 'block') {
          for (let i = runStart; i < r; i++) seeds.add(`${i},${c}`);
        }
        runStart = r;
      }
    }
  }

  // ── Rule 3: 2×2 square of same-color blocks ──
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      if (!isBlock(r, c)) continue;
      const color = board[r][c].color;
      if (
        isBlock(r,   c+1) && board[r][c+1].color   === color &&
        isBlock(r+1, c)   && board[r+1][c].color   === color &&
        isBlock(r+1, c+1) && board[r+1][c+1].color === color
      ) {
        seeds.add(`${r},${c}`);
        seeds.add(`${r},${c+1}`);
        seeds.add(`${r+1},${c}`);
        seeds.add(`${r+1},${c+1}`);
      }
    }
  }

  if (!seeds.size) return [];

  // ── Expand: BFS flood-fill from every seed, same color only ──
  // Seeds may span multiple colors (different matched groups), so
  // group them by color first, then BFS each color independently.
  const byColor = new Map(); // color → Set of "r,c" keys
  for (const key of seeds) {
    const [r, c] = key.split(',').map(Number);
    const color = board[r][c].color;
    if (!byColor.has(color)) byColor.set(color, new Set());
    byColor.get(color).add(key);
  }

  const matched = new Set();
  for (const [color, startSet] of byColor) {
    const queue = [...startSet].map(k => k.split(',').map(Number));
    const visited = new Set(startSet);
    while (queue.length) {
      const [r, c] = queue.shift();
      matched.add(`${r},${c}`);
      for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr = r + dr, nc = c + dc;
        const nk = `${nr},${nc}`;
        if (!visited.has(nk) && isBlock(nr, nc) && board[nr][nc].color === color) {
          visited.add(nk);
          queue.push([nr, nc]);
        }
      }
    }
  }

  const cells = [...matched].map(k => k.split(',').map(Number));
  return [cells];
}

// ─────────────────────────────────────────────
//  GRAVITY  (column-by-column, respects walls)
// ─────────────────────────────────────────────
function applyGravity() {
  for (let c = 0; c < COLS; c++) {
    let segStart = 0;
    for (let r = 0; r <= ROWS; r++) {
      const atWall = r === ROWS || board[r][c].t === 'wall';
      if (atWall) {
        // collect blocks in segment [segStart, r-1]
        const blocks = [];
        for (let sr = segStart; sr < r; sr++) {
          if (board[sr][c].t === 'block') blocks.push(board[sr][c].color);
        }
        // fill from bottom
        let wr = r - 1;
        for (let i = blocks.length-1; i >= 0; i--) {
          board[wr][c] = { t:'block', color: blocks[i] };
          wr--;
        }
        // empty remaining
        for (let sr = segStart; sr <= wr; sr++) board[sr][c] = { t:'empty', color:-1 };
        segStart = r + 1;
      }
    }
  }
}

// ─────────────────────────────────────────────
//  FILL NEW BLOCKS from top
// ─────────────────────────────────────────────
function fillNew() {
  const cfg = LEVELS[levelIdx];
  const newPositions = [];
  for (let c = 0; c < COLS; c++) {
    let segStart = 0;
    for (let r = 0; r <= ROWS; r++) {
      const atWall = r === ROWS || board[r][c].t === 'wall';
      if (atWall) {
        for (let sr = segStart; sr < r; sr++) {
          if (board[sr][c].t === 'empty') {
            board[sr][c] = { t:'block', color: rnd(cfg.colorCount) };
            newPositions.push([sr,c]);
          }
        }
        segStart = r + 1;
      }
    }
  }
  return newPositions;
}

// ─────────────────────────────────────────────
//  SCORE POPUP
// ─────────────────────────────────────────────
function spawnScorePopup(cells, pts) {
  if (!cells.length) return;
  let sr=0, sc=0;
  for (const [r,c] of cells) { sr+=r; sc+=c; }
  sr/=cells.length; sc/=cells.length;
  const wrap = document.getElementById('board-wrap');
  const cellPx = wrap.offsetWidth / COLS;
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = `+${pts}`;
  popup.style.left = (sc * cellPx + cellPx/2 - 20) + 'px';
  popup.style.top  = (sr * cellPx) + 'px';
  wrap.appendChild(popup);
  setTimeout(() => popup.remove(), 1200);
}

// ─────────────────────────────────────────────
//  ELIMINATION LOOP
// ─────────────────────────────────────────────
async function eliminationLoop() {
  isAnimating = true;
  while (true) {
    const groups = getGroups();
    if (!groups.length) break;

    // Mark eliminating
    const all = groups.flat();
    for (const [r,c] of all) {
      const d = cellEl(r,c);
      if (d) d.classList.add('eliminating');
    }
    await sleep(420);

    // ── Calculate score ──
    const n = all.length;
    const base       = n * 2;
    const difficulty = Math.min(50, Math.pow(n - 2, 2) * 2);

    // Update combo flag based on this elimination's block count
    const prevFlag = comboFlag;
    comboFlag = n >= 6 ? 1 : 0;

    // Combo bonus:
    //   prevFlag=1 → 20% of last score, capped at 20
    //   prevFlag=0 but flag just became 1 AND it's the very first
    //   elimination (lastPts=0) → fixed 10 pt kick-start bonus
    let bonus = 0;
    if (prevFlag === 1) {
      bonus = Math.min(20, Math.round(lastPts * 0.2));
    } else if (comboFlag === 1 && lastPts === 0) {
      bonus = 10;
    }

    const pts = base + difficulty + bonus;
    lastPts = pts;
    score += pts;
    spawnScorePopup(all, pts);

    // Remove from board
    for (const [r,c] of all) board[r][c] = { t:'empty', color:-1 };

    updateHUD();

    // Check pass
    if (!levelPassed && score >= LEVELS[levelIdx].target) {
      levelPassed = true;
      renderBoard();
      isAnimating = false;
      await sleep(150);
      showLevelComplete();
      return;
    }

    // Gravity
    applyGravity();
    renderBoard();
    await sleep(260);

    // Fill
    const newPos = fillNew();
    // animate new cells
    for (const [r,c] of newPos) {
      refreshCell(r,c);
      const d = cellEl(r,c);
      if (d) { d.classList.add('fall-in'); setTimeout(()=>d.classList.remove('fall-in'),350); }
    }
    await sleep(380);
  }
  isAnimating = false;
}

// ─────────────────────────────────────────────
//  SWAP
// ─────────────────────────────────────────────
async function doSwap(r1,c1,r2,c2) {
  isAnimating = true;
  clearHint();

  const d1 = cellEl(r1,c1);
  const d2 = cellEl(r2,c2);

  if (d1 && d2) {
    // Measure positions before any change
    const rect1 = d1.getBoundingClientRect();
    const rect2 = d2.getBoundingClientRect();

    const dx1 = rect2.left - rect1.left;
    const dy1 = rect2.top  - rect1.top;
    const dx2 = rect1.left - rect2.left;
    const dy2 = rect1.top  - rect2.top;

    // Deselect + prepare for flight
    d1.classList.remove('selected');
    d1.classList.add('swapping');
    d2.classList.add('swapping');

    // Force a reflow so the starting transform (identity) is established
    void d1.offsetWidth;

    // Apply transitions and fly to opposite positions
    d1.style.transition = 'transform 0.32s cubic-bezier(0.4, 0, 0.2, 1)';
    d2.style.transition = 'transform 0.32s cubic-bezier(0.4, 0, 0.2, 1)';
    d1.style.transform  = `translate(${dx1}px, ${dy1}px)`;
    d2.style.transform  = `translate(${dx2}px, ${dy2}px)`;

    await sleep(340);  // slightly longer than transition duration

    // Clean up inline styles
    d1.style.transition = '';
    d1.style.transform  = '';
    d2.style.transition = '';
    d2.style.transform  = '';
    d1.classList.remove('swapping');
    d2.classList.remove('swapping');
  }

  // Commit data swap
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
  steps++;
  selected = null;
  refreshCell(r1,c1);
  refreshCell(r2,c2);
  updateHUD();

  await eliminationLoop();
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
function onCellClick(r, c) {
  if (isAnimating || levelPassed) return;
  const cell = board[r][c];
  if (cell.t !== 'block') return;

  clearHint();

  if (!selected) {
    selected = [r,c];
    const d = cellEl(r,c);
    if(d) d.classList.add('selected');
    return;
  }

  const [sr,sc] = selected;
  if (sr===r && sc===c) {
    selected = null;
    const d = cellEl(r,c);
    if(d) d.classList.remove('selected');
    return;
  }

  if (Math.abs(sr-r)+Math.abs(sc-c) === 1) {
    // adjacent → swap
    doSwap(sr,sc,r,c);
  } else {
    // reselect
    const old = cellEl(sr,sc);
    if(old) old.classList.remove('selected');
    selected = [r,c];
    const d = cellEl(r,c);
    if(d) d.classList.add('selected');
  }
}

// ─────────────────────────────────────────────
//  HINT  (find a swap that creates a group ≥ 3)
// ─────────────────────────────────────────────
function findHint() {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    if (board[r][c].t!=='block') continue;
    for (const [dr,dc] of dirs) {
      const nr=r+dr, nc=c+dc;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      if (board[nr][nc].t!=='block') continue;
      // try swap
      [board[r][c], board[nr][nc]] = [board[nr][nc], board[r][c]];
      const has = getGroups().length > 0;
      [board[r][c], board[nr][nc]] = [board[nr][nc], board[r][c]];
      if (has) return [[r,c],[nr,nc]];
    }
  }
  return null;
}

function clearHint() {
  if (!hintCells) return;
  for (const [r,c] of hintCells) {
    const d = cellEl(r,c);
    if (d) { d.classList.remove('hint-a','hint-b'); }
  }
  hintCells = null;
}

function showHint() {
  if (isAnimating) return;
  clearHint();
  const hint = findHint();
  if (!hint) { alert('暂时没有可消除的移动，请继续寻找！'); return; }
  hintCells = hint;
  const [[r1,c1],[r2,c2]] = hint;
  const d1 = cellEl(r1,c1);
  const d2 = cellEl(r2,c2);
  if (d1) d1.classList.add('hint-a');
  if (d2) d2.classList.add('hint-b');
}

// ─────────────────────────────────────────────
//  LEVEL MANAGEMENT
// ─────────────────────────────────────────────
async function startLevel(idx) {
  levelIdx = idx;
  score = 0;
  steps = 0;
  selected = null;
  levelPassed = false;
  hintCells = null;
  comboFlag = 0;
  lastPts   = 0;
  buildBoard();
  updateHUD();
  renderBoard();
  await animateLevelStart();
  await eliminationLoop();
}

async function animateLevelStart() {
  // staggered fall-in per column
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      if (board[r][c].t === 'block') {
        const d = cellEl(r,c);
        if (d) {
          d.style.opacity = '0';
          d.style.transform = 'translateY(-60px)';
        }
      }
    }
    await sleep(30);
    for (let r = 0; r < ROWS; r++) {
      if (board[r][c].t === 'block') {
        const d = cellEl(r,c);
        if (d) {
          d.style.transition = 'opacity 0.3s, transform 0.3s';
          d.style.opacity = '1';
          d.style.transform = 'translateY(0)';
          setTimeout(()=>{ d.style.transition=''; d.style.transform=''; }, 320);
        }
      }
    }
  }
  await sleep(350);
}

function showLevelComplete() {
  completedLevels.add(levelIdx);
  document.getElementById('mc-level').textContent = `第 ${levelIdx+1} 关`;
  document.getElementById('mc-score').textContent = score;
  document.getElementById('mc-steps').textContent = steps;
  const nextBtn = document.getElementById('btn-next');
  if (levelIdx >= LEVELS.length-1) {
    nextBtn.style.display = 'none';
    document.getElementById('modal-complete').classList.add('hidden');
    document.getElementById('modal-allclear').classList.remove('hidden');
  } else {
    nextBtn.style.display = '';
    document.getElementById('modal-complete').classList.remove('hidden');
  }
}

function openLevelSelect() {
  const grid = document.getElementById('lvl-grid');
  grid.innerHTML = '';
  for (let i=0;i<LEVELS.length;i++) {
    const b = document.createElement('button');
    b.className = 'lvl-btn';
    let cls = 'unlocked';
    if (i === levelIdx) cls = 'active';
    else if (completedLevels.has(i)) cls = 'completed';
    b.classList.add(cls);
    b.textContent = `第${i+1}关${completedLevels.has(i)?'✓':''}`;
    b.addEventListener('click',()=>{
      document.getElementById('modal-levels').classList.add('hidden');
      startLevel(i);
    });
    grid.appendChild(b);
  }
  document.getElementById('modal-levels').classList.remove('hidden');
}

// ─────────────────────────────────────────────
//  EVENT BINDINGS
// ─────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', () => {
  document.getElementById('modal-start').classList.add('hidden');
  startLevel(0);
});

document.getElementById('btn-restart').addEventListener('click', () => {
  if (!isAnimating) startLevel(levelIdx);
});

document.getElementById('btn-hint').addEventListener('click', showHint);

document.getElementById('btn-levels').addEventListener('click', () => {
  if (!isAnimating) openLevelSelect();
});

document.getElementById('btn-close-levels').addEventListener('click', () => {
  document.getElementById('modal-levels').classList.add('hidden');
});

document.getElementById('btn-stay').addEventListener('click', () => {
  document.getElementById('modal-complete').classList.add('hidden');
  // keep levelPassed = true so the dialog won't repeatedly fire
});

document.getElementById('btn-next').addEventListener('click', () => {
  document.getElementById('modal-complete').classList.add('hidden');
  startLevel(levelIdx + 1);
});

document.getElementById('btn-replay').addEventListener('click', () => {
  document.getElementById('modal-allclear').classList.add('hidden');
  completedLevels.clear();
  startLevel(0);
});
</script>
